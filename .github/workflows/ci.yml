name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npx tsc --noEmit
      
      - name: Build
        run: npm run build
      
      - name: Check for build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          if [ ! -f "dist/mcp-server.js" ]; then
            echo "Build failed: mcp-server.js not found"
            exit 1
          fi
          echo "Build successful!"

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run prettier check
        run: npx prettier --check "src/**/*.ts" || true
        continue-on-error: true
      
      - name: Run ESLint (if configured)
        run: npx eslint "src/**/*.ts" --max-warnings 0 || true
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Test MCP server starts
        run: |
          timeout 5s node dist/mcp-server.js <<EOF || code=$?; if [ $code -ne 124 ] && [ $code -ne 0 ]; then exit $code; fi
          {"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}},"id":1}
          EOF
          echo "MCP server test passed"
        env:
          GEMINI_API_KEY: test_key
      
      - name: Test tools list
        run: |
          response=$(echo '{"jsonrpc":"2.0","method":"tools/list","id":1}' | node dist/mcp-server.js 2>/dev/null | head -1)
          if echo "$response" | grep -q "deep_research"; then
            echo "Tools list test passed"
          else
            echo "Tools list test failed"
            exit 1
          fi
        env:
          GEMINI_API_KEY: test_key

  release:
    runs-on: ubuntu-latest
    needs: [build, lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Create release artifact
        run: |
          mkdir -p release
          cp -r dist release/
          cp package.json package-lock.json release/
          cp README.md LICENSE release/ 2>/dev/null || true
          tar -czvf deep-research-mcp-server.tar.gz release
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deep-research-mcp-server
          path: dist/
          retention-days: 30